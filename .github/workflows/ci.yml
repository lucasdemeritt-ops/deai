name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Smart Contract Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chain

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chain/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npm test

  python-check:
    name: Python Checks & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check
        run: |
          python -m py_compile protocol/orchestrator.py
          python -m py_compile protocol/verification.py
          python -m py_compile protocol/ledger.py
          python -m py_compile protocol/chain_ledger.py
          python -m py_compile protocol/merkle.py
          python -m py_compile compute/node.py
          python -m py_compile shared/schemas.py
          python -m py_compile test_request.py

      - name: Unit tests
        run: python -m pytest tests/ -q
